<!DOCTYPE html>
<html>
<head>
    <title>Jacob</title>
    <link rel="stylesheet" href="styles/style.css">
    <style>
        .main-container {
            display: flex;
            height: 100vh;
        }
        #left-panel {
            width: 100% !important;
            flex: 1;
        }
        .bible-reader-container {
            display: flex;
            height: 100%;
        }
        .nav-column {
            flex: 0 0 auto;
        }
        .iframe-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .iframe-controls {
            display: flex;
            align-items: center;
            padding: 10px;
            gap: 10px;
        }
        .nav-major-header {
            padding: 10px 12px 4px 12px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #333;
            border-top: 2px solid #aaa;
            margin-top: 8px;
        }
        .nav-major-header:first-child {
            margin-top: 0;
            border-top: none;
        }
        .nav-minor-header {
            padding: 4px 12px 2px 14px;
            font-size: 11px;
            font-style: italic;
            color: #666;
        }
    </style>
    <script type="text/javascript" src="scripts/jacob.js"></script>
</head>
<body>
    <div class="main-container">
        <div class="left-panel" id="left-panel">
            <div class="bible-reader-container">
                <!-- Navigation Column -->
                <div class="nav-column" id="nav-column">
                    <div class="nav-header">
                        <span>&nbsp;</span>
                        <button class="mobile-close-btn" id="nav-close-btn" style="display: none;">×</button>
                    </div>
                    <div class="nav-list" id="nav-list">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>

                <!-- Iframe Column -->
                <div class="iframe-column">
                    <div class="iframe-controls">
                        <button id="hamburger-btn" class="hamburger-btn" style="display: none;" title="Show navigation">☰</button>
                        <div style="flex: 1; display: flex; justify-content: space-between; gap: 10px; align-items: center;">
                            <button id="prev-btn" class="nav-btn">← Previous</button>
                            <button id="next-btn" class="nav-btn">Next →</button>
                        </div>
                    </div>
                    <div style="flex: 1; overflow: hidden;">
                        <iframe
                            id="bible-visual-iframe"
                            src=""
                            style="width: 100%; height: 100%; border: none;">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
